[module/sep]
type = custom/text
content = " | "
content-foreground = ${colors.foreground-alt}

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
enable-click = true

; Solo mostramos el número, estilo minimalista: (1) (2)
label-focused = (%index%)
label-focused-foreground = ${colors.primary}
label-focused-padding = 1

label-unfocused = %index%
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 1

label-urgent = %index%!
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 1

[module/date]
type = internal/date
interval = 1
date = "%A, %B %d | %H:%M"
label = %date%
label-foreground = ${colors.foreground}

[module/network]
type = internal/network
interface = wlan0
interval = 3.0

format-connected = <label-connected>
format-connected-prefix = "  "
format-connected-prefix-foreground = ${colors.primary}
label-connected = %essid%

format-disconnected = <label-disconnected>
format-disconnected-prefix = "  "
format-disconnected-prefix-foreground = ${colors.alert}
label-disconnected = Desconectado

[module/volume]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-muted =  Silenciado
label-muted-foreground = ${colors.foreground-alt}

; Iconos que cambian según el nivel de volumen
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.primary}

[module/battery]
type = internal/battery
full-at = 99
battery = BAT0
adapter = AC

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%

format-full-prefix = " "
format-full-prefix-foreground = ${colors.green}

; Iconos que cambian según el nivel de batería
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.yellow}

; Animación de carga
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-foreground = ${colors.green}
animation-charging-framerate = 750

[module/spotify]
type = custom/script
tail = true
interval = 1
exec = ~/.config/polybar/scripts/spotify_status.sh

; Formato simple
format = <label>
; Color del texto (usamos el color primario para que resalte sutilmente sobre lo demás)
format-foreground = ${colors.primary}

; Controles con click
click-left = playerctl --player=spotify play-pause
click-right = playerctl --player=spotify next
click-middle = playerctl --player=spotify previous

[module/lockin]
type = custom/script
tail = true
interval = 1
exec = ~/.config/polybar/scripts/lockin_status.sh

format = <label>
format-foreground = ${colors.foreground}
format-background = ${colors.background}
format-padding = 1
