; include-file = ~/.config/polybar/colors.ini
; include-file = ~/.config/polybar/modules.ini
;
; include-file = ~/.config/polybar/cold_colors.ini
; include-file = ~/.config/polybar/cold_modules.ini
; 
include-file = ~/.config/polybar/gruv_colors.ini
include-file = ~/.config/polybar/gruv_modules.ini

[bar/main]
width = 100%
height = 15pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
border-size = 4
border-color = ${colors.background}
padding-left = 0
padding-right = 1
module-margin = 0

tray-position = right
tray-padding = 4
tray-background = ${colors.background}

; --- Debian Font Configuration ---
; font-0: Standard UI text font
font-0 = "DejaVu Sans:style=Book:size=10;3"
; font-1: Bold text font
font-1 = "DejaVu Sans:style=Bold:size=10;3"
; font-2: Icon font (Font Awesome)
font-2 = "Font Awesome 6 Free:style=Solid:size=10;3"

modules-left = i3
modules-center = date
modules-right = volume sep battery sep network sep

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3
override-redirect = false

[settings]
screenchange-reload = true
pseudo-transparency = true