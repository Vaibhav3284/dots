#################################
#           General             #
#################################
backend = "glx";
vsync = true;
# Evita parpadeos y mejora rendimiento
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;
log-level = "warn";

#################################
#           Fading              #
#################################
# Esto da la sensación de fluidez. Ventanas aparecen/desaparecen suavemente.
fading = true;
# Pasos más pequeños = más suave (pero consume un pelín más de CPU al abrir)
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 6;
# No desvanecer al abrir/cerrar estas ventanas
fade-exclude = [
  "class_g = 'Slop'"   # Herramienta de screenshot
];

#################################
#   Transparency / Opacity      #
#################################
# Opacidad para ventanas inactivas (le da el toque "Cozy" y profundidad)
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Reglas especificas
opacity-rule = [
  "100:class_g = 'Rofi'",
  "100:class_g = 'Polybar'",
  "100:class_g = 'firefox'",
  "100:class_g = 'mpv'",
  "100:fullscreen"
];

#################################
#           Corners             #
#################################
# Bordes redondeados sutiles
corner-radius = 0;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "class_g = 'Dunst'"
];

#################################
#     Background-Blurring       #
#################################
# El efecto "cristal empañado". Dual Kawase es el más bonito.
# Si notas lag, baja el strength a 3 o desactívalo.
blur-method = "dual_kawase";
blur-strength = 4;
blur-background = true;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Slop'",
  "class_g = 'Polybar'",
  "class_g = 'Dunst'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#           Shadows             #
#################################
# Sombras suaves para separar ventanas del fondo
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.40;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#       Window Type             #
#################################
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.9; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.95; }
  dropdown_menu = { opacity = 0.95; }
  normal = { fade = true; shadow = true; }
};
